<!DOCTYPE html>
<html lang="en">

<head>

    <title>Coastal Bend Soap Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Coastal Bend Soap Gallery</h1>

<script src="script.js"></script>
