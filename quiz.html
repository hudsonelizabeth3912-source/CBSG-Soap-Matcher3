<!DOCTYPE html>
<html lang="en">

<head>

    <title>Soap Finder Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<main>

    </button>

    <br><br>

    <button onclick="choosePersonality('Energetic')">
        Fun & Energetic
    </button>

    <button onclick="choosePersonality('Natural')">
        Natural & Simple
    </button>

</section>

</main>


<script src="script.js"></script>
